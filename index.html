<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subhadip Cyber Technology | Premium</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-cyan: #00f2fe;
            --accent-purple: #7000ff;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background Glows */
        body::before {
            content: "";
            position: fixed;
            top: -10%;
            left: -10%;
            width: 40%;
            height: 40%;
            background: radial-gradient(circle, rgba(112, 0, 255, 0.15), transparent);
            z-index: -1;
        }

        /* Logo Styling */
        .logo-wrapper {
            margin-top: 60px;
            position: relative;
            padding: 10px;
        }

        .logo-circle {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 3px;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.3);
            animation: pulse 3s infinite;
        }

        .logo-circle img {
            width: 90%;
            height: 90%;
            background: var(--bg-dark);
            border-radius: 50%;
            object-fit: cover;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #fff, var(--text-dim));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 20px 0 40px;
            letter-spacing: -0.5px;
        }

        .container {
            width: 90%;
            max-width: 400px;
        }

        /* 3D Glassmorphism Cards */
        .box {
            position: relative;
            background: var(--card-bg);
            margin-bottom: 20px;
            border-radius: 16px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
        }

        .box::after {
            content: "";
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: 0.5s;
        }

        .box:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: rgba(0, 242, 254, 0.5);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .box:hover::after {
            left: 100%;
        }

        .box a {
            display: block;
            padding: 20px;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            text-align: center;
        }

        /* The 'Call to Action' button */
        .box.featured {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            border: none;
        }

        .box.featured:hover {
            box-shadow: 0 0 25px rgba(112, 0, 255, 0.4);
        }

        .sub-text {
            display: block;
            font-size: 0.8rem;
            color: var(--text-dim);
            font-weight: 400;
            margin-top: 4px;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 20px rgba(0, 242, 254, 0.2); }
            50% { box-shadow: 0 0 40px rgba(0, 242, 254, 0.4); }
            100% { box-shadow: 0 0 20px rgba(0, 242, 254, 0.2); }
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            h1 { font-size: 1.25rem; }
            .box a { padding: 18px; }
        }
    </style>
</head>
<body>

    <div class="logo-wrapper">
        <div class="logo-circle">
            <img src="https://assets.zyrosite.com/cdn-cgi/image/format=auto,w=375,fit=crop,q=95/OgmSnBJxNUqk7ef2/ff-ac71aa02918f0be4e8b5a017beea0790-ff-untitled-design-gXCy15oy0IitY3zp.png" alt="SCT">
        </div>
    </div>

    <h1>Subhadip Cyber Technology</h1>

    <div class="container">
         <div class="box">
            <a href="https://subhadiptech.gtiweb.in/">
                New Website
                <span class="sub-text">Click here</span>
            </a>
        </div>

        <div class="box">
            <a href="#">
                About Us
                <span class="sub-text">Our tech & vision</span>
            </a>
        </div>

        <div class="box">
            <a href="contact.html">
                Contact Support
                <span class="sub-text">Get expert assistance</span>
            </a>
        </div>

        <div class="box">
            <a href="#">
                Portfolio
                <span class="sub-text">View our latest projects</span>
            </a>
        </div>
    </div>

</body>
</html>
