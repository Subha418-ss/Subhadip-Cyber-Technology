<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Under Construction | Subhadip Cyber Technology</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  min-height: 100vh;
  font-family: 'Poppins', sans-serif;
}

/* Background */
.background-container {
  position: fixed;
  inset: 0;
  z-index: -1;
}

.background-container img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(3px);
}

/* Center Content */
.content-wrapper {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

/* Glass Card */
.glass-card {
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 22px;
  padding: 40px 25px;
  max-width: 480px;
  width: 100%;
  text-align: center;
  color: #fff;
  box-shadow: 0 20px 40px rgba(0,0,0,0.25);
  transform: rotateX(8deg);
}

/* Text */
h1 {
  font-size: 2.6rem;
  font-weight: 900;
  line-height: 1.15;
  letter-spacing: 1.5px;
  margin-bottom: 18px;
}

.highlight {
  color: #ffd700;
  text-shadow: 0 0 12px rgba(255,215,0,0.6);
}

p {
  font-size: 1.05rem;
  opacity: 0.9;
  margin-bottom: 25px;
}

/* Status Dot */
.status-dot {
  width: 12px;
  height: 12px;
  background: #00ff88;
  border-radius: 50%;
  margin: 0 auto 15px;
  box-shadow: 0 0 10px #00ff88;
  animation: pulse 1.4s infinite;
}

@keyframes pulse {
  0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(0,255,136,0.6); }
  70% { transform: scale(1); box-shadow: 0 0 0 12px rgba(0,255,136,0); }
  100% { transform: scale(0.9); }
}

/* Footer */
.brand-footer {
  border-top: 1px solid rgba(255,255,255,0.25);
  padding-top: 18px;
  font-size: 0.9rem;
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* 🔥 Mobile Optimization */
@media (max-width: 600px) {
  h1 {
    font-size: 2rem;
  }

  p {
    font-size: 0.95rem;
  }

  .glass-card {
    padding: 30px 20px;
    transform: none; /* mobile-এ flat better */
  }
}
</style>
</head>

<body>

<div class="background-container">
  <img src="https://ik.imagekit.io/8v5m0fw9z/Gemini_Generated_Image_vnsgdkvnsgdkvnsg.png" alt="Holi Background">
  <div class="overlay"></div>
</div>

<div class="content-wrapper">
  <div class="glass-card">
    <div class="status-dot"></div>
    <h1>WE ARE<br><span class="highlight">BACK SOON</span></h1>
    <p>This website is currently under construction.<br>We are working hard to bring you something amazing.</p>
    <div class="brand-footer">
      <strong>© 2026 Subhadip Cyber Technologyᵀᴹ. All rights reserved.</strong>
    </div>
  </div>
</div>

</body>
</html>
